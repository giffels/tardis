version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    reviewers:
      - "giffels"
      - "MatterMiners/review"
    cooldown:
      default-days: 7
    groups:
      gha minor:
        update-types:
          - "minor"
      gha patches:
        update-types:
          - "patch"
